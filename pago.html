<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1565C0">
<title>QUIMAX — Pago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0,#1976D2);padding:20px;color:#fff;text-align:center;position:sticky;top:0;z-index:10}
.hdr h1{font-size:20px;margin-bottom:4px}
.hdr p{font-size:13px;opacity:.8}
.wrap{max-width:480px;margin:0 auto;padding:16px}
.amount{font-size:42px;font-weight:700;color:#1B5E20;text-align:center;margin:24px 0 4px}
.amount-label{font-size:14px;color:#888;text-align:center;margin-bottom:20px}
.card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);text-align:center}
.card h2{font-size:18px;color:#1565C0;margin-bottom:14px}
.qr-box{display:inline-block;padding:16px;background:#fff;border:3px solid #e0e0e0;border-radius:16px;margin-bottom:14px}
.info{font-size:14px;color:#555;line-height:1.6;text-align:left}
.info strong{color:#1a1a1a}
.cbu-box{background:#f0f0f0;border-radius:10px;padding:14px;font-family:monospace;font-size:15px;letter-spacing:1px;margin:10px 0;word-break:break-all;text-align:center}
.btn-copy{padding:12px 24px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin:6px;min-height:48px}
.btn-copy:active{transform:scale(.97)}
.btn-confirm{width:100%;padding:18px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(37,211,102,.3)}
.btn-confirm:active{transform:scale(.98)}
.nota{font-size:13px;color:#888;text-align:center;margin-top:16px}
.divider{border:none;border-top:1px solid #e0e0e0;margin:20px 0}
.test-badge{background:#FF9800;color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block;margin-bottom:10px}
.status-pend{background:#FFF3E0;border:2px solid #FF9800;border-radius:12px;padding:14px;text-align:center;margin-bottom:16px}
.status-pend .icon{font-size:32px}
.status-pend .text{font-size:15px;font-weight:700;color:#E65100;margin-top:4px}
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:72px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:700;color:#1B5E20;margin-bottom:10px}
.success-badge{display:inline-block;background:#1B5E20;color:#fff;padding:8px 24px;border-radius:30px;font-size:18px;font-weight:700;margin:16px 0}
@media(max-width:400px){
  .amount{font-size:36px}
  .btn-confirm{font-size:17px;padding:16px}
}
</style>
</head>
<body>
<div class="hdr">
<h1>💳 Pago del Pedido</h1>
<p>Completá el pago para que procesemos tu envío</p>
</div>
<div class="wrap" id="app"></div>

<script>
const params=new URLSearchParams(window.location.search);
const total=parseInt(params.get("total")||"0");
const pago=params.get("pago")||"Transferencia";
const ph=params.get("ph")||"";
const cliName=decodeURIComponent(params.get("cli")||"");
const fmt=(n)=>"$"+n.toLocaleString("es-AR");

const CBU="0000000000000000000000";
const ALIAS="QUIMAX.VENTAS";

const app=document.getElementById("app");

app.innerHTML=`
<div class="status-pend">
  <div class="icon">⏳</div>
  <div class="text">PAGO PENDIENTE</div>
</div>

${cliName?`<div style="text-align:center;font-size:15px;color:#555;margin-bottom:8px">Pedido de <b>${cliName}</b></div>`:""}
<div class="amount">${fmt(total)}</div>
<div class="amount-label">${pago==="MercadoPago"?"Pagá con MercadoPago":"Transferí este monto"}</div>

${pago==="MercadoPago"?`
<div class="card">
  <span class="test-badge">🧪 QR DE PRUEBA</span>
  <h2>📱 Escaneá con MercadoPago</h2>
  <div class="qr-box" id="qrcode"></div>
  <div style="font-size:13px;color:#888;margin-top:8px">QR de prueba. En producción se vincula a tu cuenta MP.</div>
</div>
`:`
<div class="card">
  <h2>🏦 Datos para Transferencia</h2>
  <div class="info">
    <strong>Titular:</strong> QUIMAX S.A.<br><br>
    <strong>CBU:</strong>
    <div class="cbu-box" id="cbu-text">${CBU}</div>
    <button class="btn-copy" onclick="navigator.clipboard.writeText('${CBU}').then(()=>alert('✅ CBU copiado'))">📋 Copiar CBU</button>
    <br><br>
    <strong>Alias:</strong>
    <div class="cbu-box">${ALIAS}</div>
    <button class="btn-copy" onclick="navigator.clipboard.writeText('${ALIAS}').then(()=>alert('✅ Alias copiado'))">📋 Copiar Alias</button>
  </div>
</div>
`}

<hr class="divider">

<div class="card">
  <h2>📸 ¿Ya pagaste?</h2>
  <div style="font-size:15px;color:#555;margin-bottom:14px;line-height:1.5">
    Tocá el botón para enviar el comprobante.<br>
    <b>Tu pedido cambia a ✅ PAGADO</b> y se procesa el envío.
  </div>
  <button class="btn-confirm" onclick="confirmarPago()">
    📲 YA PAGUÉ — ENVIAR COMPROBANTE
  </button>
</div>

<div class="nota">
  Importante: adjuntá la captura/comprobante en el chat de WhatsApp.<br>
  QUIMAX S.A. — quimax.com.ar
</div>`;

if(pago==="MercadoPago"){
  const qr=document.getElementById("qrcode");
  if(qr)new QRCode(qr,{text:"PRUEBA-QUIMAX-"+fmt(total)+"-"+new Date().toISOString(),width:220,height:220,colorDark:"#1B5E20",colorLight:"#fff"});
}

function confirmarPago(){
  const p=ph.replace(/\\D/g,"");
  const msg="💰✅ *PAGO CONFIRMADO*\\n\\n👤 ${cliName}\\n💲 Monto: ${fmt(total)}\\n💳 Método: ${pago}\\n📅 ${new Date().toLocaleDateString('es-AR')}\\n\\n✅ *ESTADO: PAGADO*\\n\\n👆 _Adjunto comprobante de pago_";
  
  if(p)window.open("https://wa.me/"+p+"?text="+encodeURIComponent(msg),"_blank");
  
  setTimeout(()=>{
    app.innerHTML=\`
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">¡Pago confirmado!</div>
      <div class="success-badge">✅ PAGADO</div>
      <div style="font-size:16px;color:#555;margin:16px 0;line-height:1.5">
        Tu comprobante fue enviado por WhatsApp.<br>
        <b>Tu pedido está siendo procesado.</b><br>
        En breve te contactamos para coordinar el envío.
      </div>
      <div style="background:#E8F5E9;border-radius:12px;padding:16px;text-align:left;font-size:14px">
        <div>💰 <b>${fmt(total)}</b></div>
        <div>💳 ${pago}</div>
        <div>✅ PAGADO — ${new Date().toLocaleDateString('es-AR')}</div>
      </div>
      <div class="nota" style="margin-top:24px">QUIMAX S.A. — quimax.com.ar</div>
    </div>\`;
  },500);
}
</script>
</body>
</html>
