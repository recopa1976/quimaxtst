<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1565C0">
<title>QUIMAX — Pago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0,#1976D2);padding:20px;color:#fff;text-align:center;position:sticky;top:0;z-index:10}
.hdr h1{font-size:20px;margin-bottom:4px}.hdr p{font-size:13px;opacity:.8}
.wrap{max-width:480px;margin:0 auto;padding:16px}
.status{border-radius:14px;padding:18px;text-align:center;margin-bottom:16px}
.status-pend{background:#FFF3E0;border:2px solid #FF9800}
.status-paid{background:#E8F5E9;border:2px solid #4CAF50}
.status .icon{font-size:48px}.status .text{font-size:18px;font-weight:700;margin-top:6px}
.status-pend .text{color:#E65100}.status-paid .text{color:#1B5E20}
.amount{font-size:44px;font-weight:700;color:#1B5E20;text-align:center;margin:20px 0 6px}
.amount-label{font-size:15px;color:#888;text-align:center;margin-bottom:20px}
.card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);text-align:center}
.card h2{font-size:18px;color:#1565C0;margin-bottom:14px}
.qr-box{display:inline-block;padding:16px;background:#fff;border:3px solid #e0e0e0;border-radius:16px;margin:12px 0}
.cbu-box{background:#f0f0f0;border-radius:10px;padding:14px;font-family:monospace;font-size:15px;letter-spacing:1px;margin:10px 0;word-break:break-all;text-align:center}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;min-height:56px}
.btn:active{transform:scale(.98)}
.btn-copy{background:#1565C0;color:#fff}
.btn-wa{background:#25D366;color:#fff;box-shadow:0 4px 12px rgba(37,211,102,.3)}
.btn-test{background:#FF9800;color:#fff;box-shadow:0 4px 12px rgba(255,152,0,.3)}
.info{font-size:14px;color:#555;line-height:1.7;text-align:left}
.info strong{color:#1a1a1a}
.nota{font-size:13px;color:#888;text-align:center;margin-top:16px;line-height:1.5}
.divider{border:none;border-top:1px solid #e0e0e0;margin:20px 0}
.test-badge{background:#FF9800;color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block;margin-bottom:10px}
.success-badge{display:inline-block;background:#1B5E20;color:#fff;padding:10px 28px;border-radius:30px;font-size:20px;font-weight:700;margin:16px 0}
@media(max-width:400px){.amount{font-size:38px}}
</style>
</head>
<body>
<div class="hdr"><h1>💳 Pago del Pedido</h1><p>Completá el pago para que procesemos tu envío</p></div>
<div class="wrap" id="app"></div>

<script>
const params=new URLSearchParams(window.location.search);
const total=parseInt(params.get("total")||"0");
const pago=params.get("pago")||"Transferencia";
const ph=params.get("ph")||"";
const cliName=decodeURIComponent(params.get("cli")||"Cliente");
const oid=params.get("oid")||"";
const fmt=(n)=>"$"+n.toLocaleString("es-AR");
const CBU="0000156000000000020200";
const ALIAS="COLLECTIC200";
const app=document.getElementById("app");

function showPending(){
app.innerHTML=`
<div class="status status-pend"><div class="icon">⏳</div><div class="text">PAGO PENDIENTE</div></div>
<div style="text-align:center;font-size:16px;color:#555;margin-bottom:4px">Pedido de <b>${cliName}</b></div>
<div class="amount">${fmt(total)}</div>
<div class="amount-label">${pago==="MercadoPago"?"Pagá con MercadoPago":"Transferí este monto"}</div>

${pago==="MercadoPago"?`
<div class="card">
  <span class="test-badge">🧪 QR DE PRUEBA</span>
  <h2>📱 Escaneá con MercadoPago</h2>
  <div class="qr-box"><canvas id="qr-canvas"></canvas></div>
  <div style="font-size:13px;color:#888;margin-top:8px">QR de prueba. En producción se vincula a cuenta MP real.</div>
</div>
`:`
<div class="card">
  <h2>🏦 Datos para Transferencia</h2>
  <div class="info">
    <strong>Titular:</strong> COLLECTIC SERVICIOS S.A.<br>
    <strong>CUIT:</strong> 30-71869380-9<br><br>
    <strong>CBU:</strong>
    <div class="cbu-box">${CBU}</div>
    <button class="btn btn-copy" onclick="navigator.clipboard.writeText('${CBU}').then(()=>alert('✅ CBU copiado'))">📋 Copiar CBU</button>
    <br><br>
    <strong>Alias:</strong>
    <div class="cbu-box">${ALIAS}</div>
    <button class="btn btn-copy" onclick="navigator.clipboard.writeText('${ALIAS}').then(()=>alert('✅ Alias copiado'))">📋 Copiar Alias</button>
  </div>
</div>
`}

<hr class="divider">

<div class="card">
  <h2>📸 ¿Ya pagaste?</h2>
  <div style="font-size:15px;color:#555;margin-bottom:14px;line-height:1.5">
    Enviá el comprobante por WhatsApp.<br>Tu pedido pasa a <b>✅ PAGADO</b>.
  </div>
  <button class="btn btn-wa" onclick="enviarComprobante()">📲 ENVIAR COMPROBANTE POR WHATSAPP</button>
</div>

<div class="card" style="border:2px dashed #FF9800">
  <h2 style="color:#E65100">🧪 Botón de Prueba</h2>
  <div style="font-size:14px;color:#888;margin-bottom:12px">Solo para testear. Simula que el pago fue confirmado.</div>
  <button class="btn btn-test" onclick="confirmarPago()">🧪 SIMULAR PAGO CONFIRMADO</button>
</div>

<div class="nota">QUIMAX S.A. — Fabricantes +30 años<br>quimax.com.ar</div>
`;}

function enviarComprobante(){
  const p=ph.replace(/\D/g,"");
  const paidUrl=oid?"https://recopa1976.github.io/quimaxtst/pedidos.html?paid="+oid:"";
  const msg="✅💰 *PAGO CONFIRMADO - PAGADO*\n\n👤 "+cliName+"\n💲 Monto: "+fmt(total)+"\n💳 "+pago+"\n📅 "+new Date().toLocaleDateString("es-AR")+"\n\n✅ *ESTADO: PAGADO*"+(paidUrl?"\n\n📥 Actualizar pedido:\n"+paidUrl:"")+"\n\n👆 _Adjunto comprobante_";
  if(p)window.open("https://wa.me/"+p+"?text="+encodeURIComponent(msg),"_blank");
  else alert("Copiá y envialo por WhatsApp");
  setTimeout(()=>confirmarPago(),1000);
}

function confirmarPago(){
  app.innerHTML=`
  <div class="status status-paid"><div class="icon">✅</div><div class="text">PAGO CONFIRMADO</div></div>
  <div style="text-align:center">
    <div style="font-size:22px;font-weight:700;color:#1B5E20;margin:16px 0">¡Pago recibido!</div>
    <div class="success-badge">✅ PAGADO</div>
    <div style="font-size:16px;color:#555;margin:16px 0;line-height:1.5">
      Tu pedido está siendo procesado.<br><b>En breve coordinamos el envío.</b>
    </div>
    <div style="background:#E8F5E9;border-radius:12px;padding:16px;text-align:left;font-size:15px;line-height:1.8">
      <div>👤 <b>${cliName}</b></div>
      <div>💰 <b>${fmt(total)}</b></div>
      <div>💳 ${pago}</div>
      <div>✅ PAGADO — ${new Date().toLocaleDateString("es-AR")}</div>
    </div>
    <div class="nota" style="margin-top:24px">QUIMAX S.A. — quimax.com.ar<br>📞 (011) 4641-5237</div>
  </div>`;
}

// Draw simple QR placeholder
function drawQR(){
  const canvas=document.getElementById("qr-canvas");
  if(!canvas)return;
  canvas.width=200;canvas.height=200;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,200,200);
  ctx.fillStyle="#1B5E20";
  // Simple pattern
  for(let i=0;i<20;i++)for(let j=0;j<20;j++){
    if(Math.random()>0.5||(i<3&&j<3)||(i<3&&j>16)||(i>16&&j<3))
      ctx.fillRect(i*10,j*10,10,10);
  }
  // Center text
  ctx.fillStyle="#fff";ctx.fillRect(50,80,100,40);
  ctx.fillStyle="#1B5E20";ctx.font="bold 14px DM Sans,sans-serif";
  ctx.textAlign="center";ctx.fillText("PRUEBA",100,100);
  ctx.fillText(fmt(total),100,116);
}

showPending();
setTimeout(drawQR,100);
</script>
</body>
</html>
