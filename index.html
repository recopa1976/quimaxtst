body{font-family:'DM Sans',sans-serif;background:#fafaf7;color:#1a1a1a;-webkit-tap-highlight-color:transparent}

.sec{border-radius:9px;padding:9px 11px;margin-bottom:7px}
.sec-t{font-size:19px;font-weight:700;margin-bottom:2px}
.sec-c{font-size:17px;line-height:1.5}

.venta .sec-c{color:#4A148C;font-size:19px}
.obj-s{background:#FFF3E0;border:1px solid #FFB74D}
.obj-s .sec-t{color:#E65100}
.obj-s .sec-c{color:#BF360C;font-size:19px}
.dil{background:#E8F5E9}.dil .sec-t{color:#1B5E20}
.uso-s{background:#FFF8E1}.uso-s .sec-t{color:#F57F17}
.warn-s{background:#FFEBEE}.warn-s .sec-t{color:#D32F2F}
.ideal-s{background:#E3F2FD}.ideal-s .sec-t{color:#1565C0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px}
.grid2>div{border-radius:6px;padding:7px}
.grid2 .lbl{font-size:17px;font-weight:700}
.grid2 .val{font-size:15px;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:15px}
th{padding:4px 6px;text-align:left;background:#f5f5f5}
td{padding:4px 6px;border-top:1px solid #eee}
.btn-wa{width:100%;padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:19px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-sm{font-size:19px;padding:5px 9px;border-radius:6px;cursor:pointer;width:100%;text-align:left;margin-bottom:5px;font-weight:600;border:1px solid #ddd}
.combo-hdr{background:#1B5E20;padding:6px 11px;color:#fff;display:flex;justify-content:space-between;font-weight:700;font-size:17px}
.combo-body{padding:8px 11px}
.tip-box{margin-top:5px;font-size:15px;background:#F3E5F5;border-radius:4px;padding:4px 7px;color:#6A1B9A;font-weight:500}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-c{background:#fff;border-radius:12px;width:100%;max-width:380px;max-height:90vh;overflow:auto;padding:16px}
.inp{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:15px;margin-bottom:6px}
.tag{padding:3px 9px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:15px;color:#555;display:inline-block;margin:2px}
.rubro-btn{background:#fff;border-radius:9px;border:1px solid #e0e0e0;padding:10px 12px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;width:100%;font-size:19px;font-weight:600;margin-bottom:6px}

.frase{font-size:19px;padding:3px 0;border-bottom:1px solid #eee;font-style:italic;color:#333}
.content{padding:10px 14px;padding-bottom:60px}
